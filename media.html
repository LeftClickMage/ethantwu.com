<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
        <link rel="icon" type="image/jpeg" href="public/logos/lcm-logo.png">
        <title>Ethan Twu - Social Media</title>
        <meta name="description" content="This is where you can find his online campaign!">
        <meta name="keywords" content="Ethan Twu, Ethan Twu Millburn NJ, LeftClickMage, YukiThePomsky, MLightning, FairOPShotgun">
        <link rel="canonical" href="https://ethantwu.com/media">
        <link rel="stylesheet" href="public/css/bootstrap.min.css">
        <link rel="stylesheet" href="/public/fonts/ubuntu.css?version=1.0.1">
        <link rel="stylesheet" href="/public/slideAnimations.css?version=1.0.3">
        <script src="public/js/bootstrap.bundle.min.js"></script>

        <style>
            *{
                font-family:'Ubuntu', sans-serif;
            }
            .youtubeButton {
                margin-top:40px;
                height:100px;
                background-color: rgba(210,20,20);
            }
            .youtubeButton:hover{
                cursor: pointer;
            }
            .twitchButton {
                margin-top:40px;
                height:100px;
                background-color: #6441a5;
            }
            .twitchButton:hover{
                cursor: pointer;
            }

            .imdbButton {
                margin-top:40px;
                height:100px;
                background-color: #deb522;
            }
            .imdbButton:hover{
                cursor: pointer;
            }
            .instagramButton {
                margin-top:40px;
                height:100px;
                background-color:#F56040 ;
            }
            .instagramButton:hover {
                cursor:pointer;
            }
            .bg-black{
                background-color:black;
            }
        </style>
    </head>
<body>
    <!-- Nav Code -->
    <script src="/public/navigation/homeNav.js?version=2.3.1"></script>
    <script src="/public/downtime.js"></script>
    <!-- three.js package -->
    <script async src="/public/js/moduleChecker.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "/public/js/three/three.js",
            "three/addons/": "/public/js/three/jsm/"
        }
    }
    </script>
    <!-- Background Code-->
    <link rel="stylesheet" href="/public/backgrounds/background.css">
    <canvas id = "overallBackground" class="background" style="z-index:-1; top:0; left:0;"></canvas>
    <script type="module" src="/public/backgrounds/index.js?version=1.0.2"></script>
 
    <div class="d-flex align-items-center" style="min-height:45vh;">
        <div class="container-md text-center mt-5">
            <h1 class="display-1 fw-bold text-white text-center glowWhite slide-in-top">Ethan's Media</h1>
        </div>
    </div>
    <div class="row container-fluid text-center mx-0 slide-in-bottom mb-5" style="font-weight:bold;" id="overallContainer">
    <!-- container for media elements   -->
    </div>
    <script>
        var amount = 0;
        function createMediaElement({type, text, link, imgsrc, rounded = false}){
            amount++;

            var overallContainer = document.getElementById('overallContainer');

            var buttonElement = document.createElement("button");
            buttonElement.classList.add(type + "Button", "backgroundGlow", "col-md-7", "col-xl-5", "btn", "border", "border-5", "border-light", "fs-3", "position-relative", "d-flex", "align-items-center");
            type == "imdb" ? buttonElement.classList.add("text-dark") : buttonElement.classList.add("text-white");
            buttonElement.setAttribute("style", "position:absolute;left:50%;transform:translateX(-50%);");
            (amount == 1) ? buttonElement.classList.add("mt-0") : "Not the top element" ;
            buttonElement.setAttribute("onclick", "window.open('"+ link + "')");

            var spanElement1 = document.createElement("span");
            spanElement1.classList.add("float-start", "p-1");
            var imgElement1 = document.createElement("img");
            imgElement1.setAttribute("src", "public/logos/" + imgsrc);
            imgElement1.setAttribute("width", "70px");
            rounded ? imgElement1.classList.add("rounded-circle") : "Element logo not round.";
            spanElement1.appendChild(imgElement1);
            
            var spanElement2 = document.createElement("span");
            spanElement2.classList.add("fw-bold", "ms-5", "ms-sm-0");
            spanElement2.setAttribute("style", "position:absolute;left:50%;transform:translateX(-50%);");
            spanElement2.innerHTML = text;

            var spanElement3 = document.createElement("span");
            spanElement3.classList.add("badge", "bg-black", "px-3", "py-1", "float-end", "ms-auto", "border", "border-light", "border-3", "d-none", "d-sm-block");
            var imgElement3 = document.createElement("img");
            imgElement3.src = "public/logos/" + type + ".png";
            imgElement3.setAttribute("width", "60px");
            spanElement3.appendChild(imgElement3);
            
            buttonElement.appendChild(spanElement1);
            buttonElement.appendChild(spanElement2);
            buttonElement.appendChild(spanElement3);

            overallContainer.appendChild(buttonElement);
        }

        createMediaElement({
            type: "instagram",
            text: "LeftClickMage",
            link: "https://www.instagram.com/leftclickmage/",
            imgsrc: "ethanTwuLogo.jpg",
            rounded: true,
        });

        createMediaElement({
            type: "youtube",
            text: "Ethan Twu",
            link: "https://youtube.com/@ethantwu/",
            imgsrc: "ethanTwuLogo.jpg",
            rounded: true,
        });

        createMediaElement({
            type: "imdb",
            text: "Ethan Twu",
            link: "https://www.imdb.com/name/nm18293870/",
            imgsrc: "ethanTwuLogo.jpg",
            rounded: true,
        });

        createMediaElement({
            type: "youtube",
            text: "LeftClickMage",
            link: "https://youtube.com/leftclickmage/",
            imgsrc: "lcm-logo.png",
        });

        createMediaElement({
            type: "twitch",
            text: "LeftClickMage",
            link: "https://twitch.tv/leftclickmage/",
            imgsrc: "lcm-logo.png",
        });

        createMediaElement({
            type: "youtube",
            text: "LeftClickMage",
            link: "https://youtube.com/YukiThePomsky/",
            imgsrc: "yuki-logo.jpg",
            rounded: true,
        });

        createMediaElement({
            type: "youtube",
            text: "LeftClickMageTKD",
            link: "https://youtube.com/@leftclickmagetkd/",
            imgsrc: "lcmtkd-logo.jpg",
            rounded: true,
        });

    </script>
</body>

</html>
